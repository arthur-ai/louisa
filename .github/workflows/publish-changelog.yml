name: Publish Monthly Changelog

on:
  schedule:
    # Run on the 28th of each month at 9 AM UTC — safe for all months (Feb–Dec).
    # Re-trigger manually (workflow_dispatch) to pick up any 29–31st releases.
    - cron: "0 9 28 * *"
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to publish (e.g. "March 2026"). Defaults to current month.'
        required: false

jobs:
  publish-changelog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine month
        id: month
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "value=${{ github.event.inputs.month }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date '+%B %Y')" >> "$GITHUB_OUTPUT"
          fi

      - name: Backfill release log (last 30 days)
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITLAB_TOKEN:      ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
        run: node scripts/backfill-log.js ${{ secrets.REPO_OWNER }} ${{ secrets.REPO_NAME }} --days 30

      - name: Publish changelog to readme.io
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          README_API_KEY:    ${{ secrets.README_API_KEY }}
        run: node scripts/publish-changelog.js "${{ steps.month.outputs.value }}"
