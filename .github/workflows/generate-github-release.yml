name: Generate GitHub Release Notes

# Triggered by api/webhook.js when a production GitHub (arthur-engine) tag is pushed.
# Runs summarization + release note generation with no 60-second time constraint,
# then commits the updated summaries log back to the repo for future releases.

on:
  repository_dispatch:
    types: [louisa-github-release]
  workflow_dispatch:
    inputs:
      owner:
        description: "GitHub repo owner (e.g. arthur-ai)"
        required: true
        default: "arthur-ai"
      repo:
        description: "GitHub repo name (e.g. arthur-engine)"
        required: true
        default: "arthur-engine"
      tag:
        description: "Tag to generate release notes for (e.g. 2.1.516)"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated logs/pr-summaries.jsonl

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.LOUISA_APP_ID }}
          private-key: ${{ secrets.LOUISA_APP_PRIVATE_KEY }}
          # Request access to both louisa (for log commit) and the target repo
          owner: ${{ github.repository_owner }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Summarize PRs and generate release notes
        env:
          GITHUB_APP_ID:              ${{ secrets.LOUISA_APP_ID }}
          GITHUB_APP_PRIVATE_KEY:     ${{ secrets.LOUISA_APP_PRIVATE_KEY }}
          GITHUB_APP_INSTALLATION_ID: ${{ steps.app-token.outputs.installation-id }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL:          ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL:          ${{ secrets.TEAMS_WEBHOOK_URL }}
          ARTHUR_BASE_URL:            ${{ secrets.ARTHUR_BASE_URL }}
          ARTHUR_API_KEY:             ${{ secrets.ARTHUR_API_KEY }}
          ARTHUR_TASK_ID:             ${{ secrets.ARTHUR_TASK_ID }}
          OWNER: ${{ github.event.client_payload.owner || github.event.inputs.owner }}
          REPO:  ${{ github.event.client_payload.repo  || github.event.inputs.repo  }}
          TAG:   ${{ github.event.client_payload.tag   || github.event.inputs.tag   }}
        run: |
          node scripts/generate-github-release.js \
            --owner "$OWNER" \
            --repo  "$REPO"  \
            --tag   "$TAG"

      - name: Commit updated summaries log
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "louisa-bot"
          git config user.email "louisa-bot@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || git commit -m "chore: summaries log for ${{ github.event.client_payload.tag || github.event.inputs.tag }}"
          for i in 1 2 3; do
            git pull --rebase && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
